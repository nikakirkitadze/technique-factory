<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechniqueFactory - სამშენებლო ტექნიკის გაქირავება</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+Georgian:wght@300;400;500;600;700;800&display=swap');

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #09090b;
            --bg-secondary: #131316;
            --bg-card: #18181b;
            --bg-card-hover: #1e1e22;
            --bg-elevated: #232328;
            --accent: #d97706;
            --accent-light: #f59e0b;
            --accent-dim: #92400e;
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --border: #27272a;
            --border-light: #3f3f46;
            --success: #22c55e;
            --radius: 12px;
            --radius-sm: 8px;
            --radius-lg: 16px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', 'Noto Sans Georgian', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* HEADER */
        .header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            background: rgba(9, 9, 11, 0.8);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            transition: var(--transition);
        }
        .header.scrolled { background: rgba(9, 9, 11, 0.95); }
        .header-inner {
            max-width: 1280px; margin: 0 auto; padding: 0 24px;
            height: 64px; display: flex; align-items: center; justify-content: space-between;
        }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text-primary); }
        .logo-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 16px; color: #000;
        }
        .logo-text { font-weight: 700; font-size: 18px; letter-spacing: -0.5px; }
        .logo-text span { color: var(--accent-light); }

        .header-right { display: flex; align-items: center; gap: 16px; }

        /* LANG SWITCHER */
        .lang-switcher {
            display: flex; border: 1px solid var(--border); border-radius: 100px; overflow: hidden;
        }
        .lang-btn {
            padding: 5px 12px; background: transparent; border: none;
            color: var(--text-muted); font-size: 12px; font-weight: 600;
            cursor: pointer; transition: var(--transition); font-family: inherit;
            letter-spacing: 0.5px;
        }
        .lang-btn:not(:last-child) { border-right: 1px solid var(--border); }
        .lang-btn:hover { color: var(--text-primary); background: var(--bg-elevated); }
        .lang-btn.active { background: var(--accent); color: #000; }

        .header-phone {
            display: flex; align-items: center; gap: 8px;
            color: var(--text-secondary); text-decoration: none;
            font-size: 14px; font-weight: 500; transition: var(--transition);
        }
        .header-phone:hover { color: var(--accent-light); }
        .header-phone svg { width: 16px; height: 16px; }

        .btn-cta {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 8px 20px; background: var(--accent); color: #000;
            border: none; border-radius: var(--radius-sm);
            font-size: 14px; font-weight: 600; cursor: pointer;
            transition: var(--transition); text-decoration: none;
        }
        .btn-cta:hover { background: var(--accent-light); transform: translateY(-1px); }

        /* HERO */
        .hero { padding: 120px 24px 60px; max-width: 1280px; margin: 0 auto; position: relative; }
        .hero::before {
            content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(217,119,6,0.08) 0%, transparent 70%);
            pointer-events: none;
        }
        .hero-badge {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 6px 14px; background: rgba(217,119,6,0.1);
            border: 1px solid rgba(217,119,6,0.2); border-radius: 100px;
            font-size: 13px; color: var(--accent-light); font-weight: 500;
            margin-bottom: 20px; animation: fadeInUp 0.6s ease-out;
        }
        .hero-badge-dot { width: 6px; height: 6px; background: var(--success); border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        .hero h1 {
            font-size: clamp(32px,5vw,56px); font-weight: 800; line-height: 1.1;
            letter-spacing: -1.5px; margin-bottom: 16px;
            animation: fadeInUp 0.6s ease-out 0.1s both;
        }
        .hero h1 .accent {
            background: linear-gradient(135deg, var(--accent-light), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .hero-subtitle {
            font-size: 18px; color: var(--text-secondary); max-width: 540px;
            line-height: 1.7; margin-bottom: 32px;
            animation: fadeInUp 0.6s ease-out 0.2s both;
        }
        .hero-stats { display: flex; gap: 40px; animation: fadeInUp 0.6s ease-out 0.3s both; }
        .hero-stat { display: flex; flex-direction: column; }
        .hero-stat-value { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
        .hero-stat-label { font-size: 13px; color: var(--text-muted); font-weight: 500; }

        /* FILTERS */
        .filter-section { max-width: 1280px; margin: 0 auto; padding: 0 24px 32px; animation: fadeInUp 0.6s ease-out 0.4s both; }
        .filter-bar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .filter-btn {
            padding: 8px 18px; border: 1px solid var(--border); background: var(--bg-secondary);
            color: var(--text-secondary); border-radius: 100px; font-size: 14px;
            font-weight: 500; cursor: pointer; transition: var(--transition); font-family: inherit;
        }
        .filter-btn:hover { border-color: var(--border-light); color: var(--text-primary); background: var(--bg-elevated); }
        .filter-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
        .results-count { margin-left: auto; font-size: 14px; color: var(--text-muted); }

        /* GRID */
        .machines-grid {
            max-width: 1280px; margin: 0 auto; padding: 0 24px 80px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px;
        }

        /* CARD */
        .machine-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius-lg); overflow: hidden; cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
            position: relative; animation: fadeInUp 0.5s ease-out both;
        }
        .machine-card:nth-child(1){animation-delay:.05s} .machine-card:nth-child(2){animation-delay:.1s}
        .machine-card:nth-child(3){animation-delay:.15s} .machine-card:nth-child(4){animation-delay:.2s}
        .machine-card:nth-child(5){animation-delay:.25s} .machine-card:nth-child(6){animation-delay:.3s}
        .machine-card:hover {
            border-color: var(--border-light); background: var(--bg-card-hover);
            transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.5);
        }
        .card-image-wrap { position: relative; height: 220px; overflow: hidden; background: var(--bg-secondary); }
        .card-image { width: 100%; height: 100%; object-fit: cover; object-position: center; transition: transform 0.6s cubic-bezier(0.4,0,0.2,1); }
        .machine-card:hover .card-image { transform: scale(1.05); }
        .card-badge { position: absolute; top: 12px; left: 12px; display: flex; gap: 8px; }
        .badge { padding: 4px 12px; border-radius: 100px; font-size: 12px; font-weight: 600; backdrop-filter: blur(12px); }
        .badge-available { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.2); }
        .badge-popular { background: rgba(217,119,6,0.15); color: var(--accent-light); border: 1px solid rgba(217,119,6,0.2); }
        .badge-unavailable { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.2); }
        .card-body { padding: 20px; }
        .card-brand { font-size: 12px; font-weight: 600; color: var(--accent-light); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
        .card-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.3px; }
        .card-subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; }
        .card-specs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
        .card-spec { display: flex; flex-direction: column; gap: 2px; }
        .card-spec-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
        .card-spec-value { font-size: 14px; font-weight: 600; }
        .card-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 16px; border-top: 1px solid var(--border); }
        .card-view-label { font-size: 13px; color: var(--text-muted); font-weight: 500; }
        .card-arrow {
            width: 40px; height: 40px; border-radius: 50%;
            background: var(--bg-elevated); border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center; transition: var(--transition);
        }
        .machine-card:hover .card-arrow { background: var(--accent); border-color: var(--accent); }
        .machine-card:hover .card-arrow svg { stroke: #000; transform: translateX(2px); }
        .card-arrow svg { width: 18px; height: 18px; stroke: var(--text-secondary); transition: var(--transition); }

        /* DETAIL */
        .detail-overlay { position: fixed; inset: 0; z-index: 200; display: none; opacity: 0; }
        .detail-overlay.active { display: block; animation: overlayIn .3s ease-out forwards; }
        .detail-overlay.closing { animation: overlayOut .3s ease-in forwards; }
        @keyframes overlayIn { from{opacity:0} to{opacity:1} }
        @keyframes overlayOut { from{opacity:1} to{opacity:0} }
        .detail-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); }
        .detail-panel {
            position: absolute; top: 0; right: 0; width: 100%; max-width: 640px;
            height: 100%; background: var(--bg-primary); border-left: 1px solid var(--border);
            overflow-y: auto; transform: translateX(100%);
            animation: slideIn .4s cubic-bezier(0.16,1,0.3,1) .1s forwards;
        }
        .detail-overlay.closing .detail-panel { animation: slideOut .3s ease-in forwards; }
        @keyframes slideIn { from{transform:translateX(100%)} to{transform:translateX(0)} }
        @keyframes slideOut { from{transform:translateX(0)} to{transform:translateX(100%)} }
        .detail-close {
            position: sticky; top: 0; z-index: 10; display: flex; align-items: center;
            justify-content: space-between; padding: 16px 24px;
            background: rgba(9,9,11,0.9); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .detail-close-btn, .detail-share-btn {
            width: 36px; height: 36px; border-radius: 50%;
            border: 1px solid var(--border); background: var(--bg-secondary);
            color: var(--text-secondary); display: flex; align-items: center;
            justify-content: center; cursor: pointer; transition: var(--transition);
        }
        .detail-close-btn:hover, .detail-share-btn:hover { background: var(--bg-elevated); color: var(--text-primary); border-color: var(--border-light); }
        .detail-nav-title { font-size: 14px; font-weight: 600; color: var(--text-secondary); }
        .detail-hero-img { width: 100%; height: 320px; object-fit: cover; opacity: 0; animation: fadeIn .5s ease-out .3s forwards; }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        .detail-content { padding: 28px 24px 40px; }
        .detail-header { margin-bottom: 28px; opacity: 0; transform: translateY(16px); animation: fadeInUp .5s ease-out .35s forwards; }
        .detail-brand { font-size: 13px; font-weight: 600; color: var(--accent-light); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 8px; }
        .detail-title { font-size: 28px; font-weight: 800; letter-spacing: -0.8px; margin-bottom: 6px; }
        .detail-subtitle-text { font-size: 15px; color: var(--text-secondary); line-height: 1.7; }
        .detail-section { margin-bottom: 28px; opacity: 0; transform: translateY(16px); animation: fadeInUp .5s ease-out forwards; }
        .detail-section:nth-child(4){animation-delay:.45s} .detail-section:nth-child(5){animation-delay:.5s}
        .detail-section:nth-child(6){animation-delay:.55s} .detail-section:nth-child(7){animation-delay:.6s}
        .detail-section-title {
            font-size: 13px; font-weight: 600; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px;
            padding-bottom: 10px; border-bottom: 1px solid var(--border);
        }
        .detail-specs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; }
        .detail-spec { padding: 14px 16px; background: var(--bg-card); display: flex; flex-direction: column; gap: 4px; }
        .detail-spec:first-child{border-radius:var(--radius-sm) 0 0 0} .detail-spec:nth-child(2){border-radius:0 var(--radius-sm) 0 0}
        .detail-spec:nth-last-child(2){border-radius:0 0 0 var(--radius-sm)} .detail-spec:last-child{border-radius:0 0 var(--radius-sm) 0}
        .detail-spec-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
        .detail-spec-value { font-size: 15px; font-weight: 700; }
        .detail-description { font-size: 15px; color: var(--text-secondary); line-height: 1.8; }
        .detail-features { display: flex; flex-direction: column; gap: 10px; }
        .detail-feature { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--bg-card); border-radius: var(--radius-sm); }
        .detail-feature-icon {
            width: 32px; height: 32px; border-radius: 8px;
            background: rgba(217,119,6,0.1); display: flex; align-items: center;
            justify-content: center; flex-shrink: 0;
        }
        .detail-feature-icon svg { width: 16px; height: 16px; stroke: var(--accent-light); }
        .detail-feature-text { font-size: 14px; font-weight: 500; }
        .detail-cta { display: flex; gap: 12px; margin-top: 32px; opacity: 0; transform: translateY(16px); animation: fadeInUp .5s ease-out .65s forwards; }
        .btn-primary {
            flex: 1; padding: 16px 24px; background: var(--accent); color: #000;
            border: none; border-radius: var(--radius); font-size: 15px; font-weight: 700;
            cursor: pointer; transition: var(--transition); font-family: inherit;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            text-decoration: none;
        }
        .btn-primary:hover { background: var(--accent-light); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(217,119,6,0.3); }
        .btn-secondary {
            padding: 16px 24px; background: var(--bg-card); color: var(--text-primary);
            border: 1px solid var(--border); border-radius: var(--radius); font-size: 15px;
            font-weight: 600; cursor: pointer; transition: var(--transition); font-family: inherit;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-secondary:hover { background: var(--bg-elevated); border-color: var(--border-light); }

        /* FOOTER */
        .footer { border-top: 1px solid var(--border); padding: 40px 24px; text-align: center; }
        .footer-inner { max-width: 1280px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
        .footer-text { font-size: 13px; color: var(--text-muted); }
        .footer-links { display: flex; gap: 24px; }
        .footer-link { font-size: 13px; color: var(--text-secondary); text-decoration: none; transition: var(--transition); }
        .footer-link:hover { color: var(--accent-light); }

        @keyframes fadeInUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

        /* RESPONSIVE */
        @media(max-width:768px) {
            .header-phone{display:none} .hero{padding:100px 20px 40px}
            .hero-stats{gap:24px} .hero-stat-value{font-size:22px}
            .filter-section{padding:0 20px 24px}
            .machines-grid{padding:0 20px 60px;grid-template-columns:1fr;gap:16px}
            .detail-panel{max-width:100%} .detail-hero-img{height:240px}
            .detail-title{font-size:24px}
            .footer-inner{flex-direction:column;text-align:center}
        }
        @media(max-width:480px) {
            .machines-grid{grid-template-columns:1fr}
            .hero h1{font-size:28px} .hero-subtitle{font-size:16px}
        }

        .no-results { grid-column: 1/-1; text-align: center; padding: 80px 20px; }
        .no-results-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
        .no-results-text { font-size: 18px; color: var(--text-muted); font-weight: 500; }
    </style>
</head>
<body>

<header class="header" id="header">
    <div class="header-inner">
        <a href="#" class="logo" onclick="closeDetail();return false;">
            <div class="logo-icon">TF</div>
            <div class="logo-text">Technique<span>Factory</span></div>
        </a>
        <div class="header-right">
            <div class="lang-switcher">
                <button class="lang-btn active" data-lang="ka">GE</button>
                <button class="lang-btn" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="ru">RU</button>
            </div>
            <a href="tel:+995555025302" class="header-phone">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.87.35 1.72.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c1.09.35 1.94.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                +995 555 02 53 02
            </a>
            <a href="tel:+995555025302" class="btn-cta" id="headerCta">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.87.35 1.72.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c1.09.35 1.94.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                <span data-i18n="callBtn"></span>
            </a>
        </div>
    </div>
</header>

<section class="hero">
    <div class="hero-badge">
        <div class="hero-badge-dot"></div>
        <span data-i18n="heroBadge"></span>
    </div>
    <h1 id="heroTitle"></h1>
    <p class="hero-subtitle" data-i18n="heroSubtitle"></p>
    <div class="hero-stats">
        <div class="hero-stat">
            <div class="hero-stat-value">12+</div>
            <div class="hero-stat-label" data-i18n="statUnits"></div>
        </div>
        <div class="hero-stat">
            <div class="hero-stat-value">24/7</div>
            <div class="hero-stat-label" data-i18n="statService"></div>
        </div>
        <div class="hero-stat">
            <div class="hero-stat-value">500+</div>
            <div class="hero-stat-label" data-i18n="statOrders"></div>
        </div>
    </div>
</section>

<section class="filter-section">
    <div class="filter-bar" id="filterBar"></div>
</section>

<section class="machines-grid" id="machinesGrid"></section>

<div class="detail-overlay" id="detailOverlay">
    <div class="detail-backdrop" onclick="closeDetail()"></div>
    <div class="detail-panel" id="detailPanel"></div>
</div>

<footer class="footer">
    <div class="footer-inner">
        <div class="footer-text" id="footerText"></div>
        <div class="footer-links">
            <a href="tel:+995555025302" class="footer-link" data-i18n="contact"></a>
            <a href="#" class="footer-link" data-i18n="terms"></a>
        </div>
    </div>
</footer>

<script>
// ==================== i18n ====================
const T = {
    ka: {
        title: "TechniqueFactory - სამშენებლო ტექნიკის გაქირავება",
        callBtn: "დარეკე",
        heroBadge: "ხელმისაწვდომია ახლავე",
        heroTitle1: "სამშენებლო ტექნიკის",
        heroTitle2: "გაქირავება",
        heroSubtitle: "პროფესიონალური ტექნიკა თქვენი პროექტისთვის. მინი ექსკავატორები, ბობკეტები, სატვირთოები და სხვა.",
        statUnits: "ტექნიკის ერთეული",
        statService: "მომსახურება",
        statOrders: "შესრულებული შეკვეთა",
        filterAll: "ყველა",
        filterExcavator: "ექსკავატორები",
        filterLoader: "ბობკეტები",
        filterTruck: "სატვირთოები",

        <button class="filter-btn ${currentFilter==='truck'?'active':''}" data-filter="truck">${t('filterTruck')}</button>
        <button class="filter-btn ${currentFilter==='other'?'active':''}" data-filter="other">${t('filterOther')}</button>
        <div class="results-count" id="resultsCount"></div>
    `;
    filterBar.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            currentFilter = btn.dataset.filter;
            applyLang();
        });
    });

    // Lang buttons
    document.querySelectorAll('.lang-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.lang === lang);
    });

    renderCards(currentFilter);
}

function renderCards(filter) {
    const filtered = filter === 'all' ? machines : machines.filter(m => m.category === filter);
    document.getElementById('resultsCount').textContent = `${filtered.length} ${t('units')}`;

    if (filtered.length === 0) {
        grid.innerHTML = `<div class="no-results"><div class="no-results-icon">🔍</div><div class="no-results-text">${t('noResults')}</div></div>`;
        return;
    }

    grid.innerHTML = filtered.map((m, i) => {
        const imgSrc = m.image || makeSvgPlaceholder(m.brand, m.category, '#d97706');
        const name = localized(m.name);
        const wt = localized(m.weight);
        const hrs = localized(m.hours);
        return `
        <div class="machine-card" onclick="openDetail(${m.id})" style="animation-delay:${i*0.05}s">
            <div class="card-image-wrap">
                <img class="card-image" src="${imgSrc}" alt="${name}" loading="lazy"/>
                <div class="card-badge">
                    ${m.available ? `<span class="badge badge-available">${t('available')}</span>` : `<span class="badge badge-unavailable">${t('unavailable')}</span>`}
                    ${m.popular ? `<span class="badge badge-popular">${t('popular')}</span>` : ''}
                </div>
            </div>
            <div class="card-body">
                <div class="card-brand">${m.brand}</div>
                <div class="card-title">${name}</div>
                <div class="card-specs">
                    <div class="card-spec"><div class="card-spec-label">${t('weight')}</div><div class="card-spec-value">${wt}</div></div>
                    <div class="card-spec"><div class="card-spec-label">${t('power')}</div><div class="card-spec-value">${m.power}</div></div>
                    <div class="card-spec"><div class="card-spec-label">${t('year')}</div><div class="card-spec-value">${m.year}</div></div>
                    <div class="card-spec"><div class="card-spec-label">${t('hours')}</div><div class="card-spec-value">${hrs}</div></div>
                </div>
                <div class="card-footer">
                    <div class="card-view-label">${t('viewDetails')}</div>
                    <div class="card-arrow">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                    </div>
                </div>
            </div>
        </div>`;
    }).join('');
}

// ==================== DETAIL ====================
function openDetail(id) {
    const m = machines.find(x => x.id === id);
    if (!m) return;
    const detailImg = m.image || makeSvgPlaceholder(m.brand, m.category, '#d97706');
    const name = localized(m.name);
    const desc = localized(m.description);
    const feats = localized(m.features);
    const specs = localized(m.specs);
    const ys = t('yearSuffix');

    const specsHtml = Object.entries(specs).map(([k,v]) => `
        <div class="detail-spec"><div class="detail-spec-label">${k}</div><div class="detail-spec-value">${v}</div></div>
    `).join('');

    const featuresHtml = feats.map(f => `
        <div class="detail-feature">
            <div class="detail-feature-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
            <div class="detail-feature-text">${f}</div>
        </div>
    `).join('');

    panel.innerHTML = `
        <div class="detail-close">
            <button class="detail-close-btn" onclick="closeDetail()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
            <div class="detail-nav-title">${m.brand} ${name}</div>
            <button class="detail-share-btn" onclick="shareMachine(${m.id})">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
            </button>
        </div>
        <img class="detail-hero-img" src="${detailImg}" alt="${name}"/>
        <div class="detail-content">
            <div class="detail-header">
                <div class="detail-brand">${m.brand}</div>
                <h2 class="detail-title">${name}</h2>
                <p class="detail-subtitle-text">${m.year} ${ys}</p>
            </div>
            <div class="detail-section">
                <div class="detail-section-title">${t('specs')}</div>
                <div class="detail-specs-grid">${specsHtml}</div>
            </div>
            <div class="detail-section">
                <div class="detail-section-title">${t('description')}</div>
                <p class="detail-description">${desc}</p>
            </div>
            <div class="detail-section">
                <div class="detail-section-title">${t('features')}</div>
                <div class="detail-features">${featuresHtml}</div>
            </div>
            <div class="detail-cta">
                <a href="tel:+995555025302" class="btn-primary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.87.35 1.72.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c1.09.35 1.94.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                    ${t('callNow')}
                </a>
                <button class="btn-secondary" onclick="closeDetail()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                    ${t('back')}
                </button>
            </div>
        </div>
    `;
    overlay.classList.remove('closing');
    overlay.classList.add('active');
    document.body.style.overflow = 'hidden';
    panel.scrollTop = 0;
}

function closeDetail() {
    overlay.classList.add('closing');
    setTimeout(() => { overlay.classList.remove('active','closing'); document.body.style.overflow = ''; }, 300);
}

function shareMachine(id) {
    const m = machines.find(x => x.id === id);
    if (navigator.share) {
        navigator.share({ title: localized(m.name), text: `${m.brand} ${localized(m.name)} — TechniqueFactory`, url: window.location.href });
    }
}

// ==================== LANG SWITCHER ====================
document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        lang = btn.dataset.lang;
        localStorage.setItem('tf_lang', lang);
        applyLang();
    });
});

// ==================== SCROLL / KEYBOARD ====================
window.addEventListener('scroll', () => { document.getElementById('header').classList.toggle('scrolled', window.scrollY > 20); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeDetail(); });

// ==================== INIT ====================
applyLang();
</script>
</body>
</html>
